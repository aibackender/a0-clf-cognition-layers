      </div>
    </div>
  </div>

  <div class="rounded border border-zinc-700 p-5 space-y-4">
    <div class="space-y-1">
      <div class="font-semibold">Recovery &amp; Patterns</div>
      <p class="text-zinc-300">These controls tune how much CLF learns from recent work and how aggressively it should try to recover from bad tool outcomes.</p>
    </div>
    <div class="grid gap-4 md:grid-cols-2">
      <div class="space-y-3">
        <label class="block">
          <div>Inject top-K patterns</div>
          <input class="w-full mt-1 bg-zinc-900 text-zinc-100 border border-zinc-700 rounded p-2" type="number" min="0" max="10" x-model.number="config.pattern_memory.inject_top_k_patterns" />
        </label>
        <label class="block">
          <div>Minimum confidence</div>
          <input class="w-full mt-1 bg-zinc-900 text-zinc-100 border border-zinc-700 rounded p-2" type="number" min="0" max="1" step="0.01" x-model.number="config.pattern_memory.minimum_pattern_confidence" />
        </label>
      </div>
      <div class="space-y-3">
        <label class="block">
          <div>Self-correction mode</div>
          <select class="w-full mt-1 bg-zinc-900 text-zinc-100 border border-zinc-700 rounded p-2" x-model="config.layers.self_correction.mode">
            <option value="off">off</option>
            <option value="advisory">advisory</option>
            <option value="auto">auto</option>
          </select>
        </label>
        <label class="block">
          <div>Max correction attempts</div>
          <input class="w-full mt-1 bg-zinc-900 text-zinc-100 border border-zinc-700 rounded p-2" type="number" min="0" max="10" x-model.number="config.self_correction.max_correction_attempts" />
        </label>
      </div>
    </div>
    <div class="rounded border border-zinc-800 bg-zinc-950/40 p-4 space-y-3">
      <div class="space-y-1">
        <div class="font-medium text-zinc-100">Bounded Recovery</div>
        <p class="text-zinc-400">Use this non-certified override for long-running research tasks when Full recovery is too persistent or keeps extending the run.</p>
      </div>
      <label class="flex items-center gap-2">
        <input type="checkbox" x-model="config.bounded_recovery.enabled" />
        <span>Enable bounded recovery override</span>
      </label>
      <p class="rounded border border-zinc-800 bg-zinc-900/70 px-3 py-2 text-zinc-300" x-text="boundedRecoveryHelp()"></p>
      <div class="grid gap-4 md:grid-cols-3">
        <label class="flex items-center gap-2 rounded border border-zinc-800 bg-zinc-950/40 px-3 py-3">
          <input type="checkbox" x-model="config.bounded_recovery.allow_auto_continue_after_failure" />
          <span>Allow auto-continue after failure</span>
        </label>
        <label class="block">
          <div>Max restore resolution</div>
          <select class="w-full mt-1 bg-zinc-900 text-zinc-100 border border-zinc-700 rounded p-2" x-model="config.bounded_recovery.max_restore_resolution">
            <option value="context_id">context_id</option>
            <option value="scope_label">scope_label</option>
            <option value="scope_project">scope_project</option>
            <option value="latest_compatible">latest_compatible</option>
          </select>
        </label>
        <label class="flex items-center gap-2 rounded border border-zinc-800 bg-zinc-950/40 px-3 py-3">
          <input type="checkbox" x-model="config.bounded_recovery.inject_idle_recovery_policy" />
          <span>Inject idle recovery policy</span>
        </label>
      </div>
    </div>
  </div>

  <div class="rounded border border-zinc-700 p-5 space-y-4">
    <div class="space-y-1">
      <div class="font-semibold">Observability</div>
      <p class="text-zinc-300">Control how much CLF runtime detail is shown in the conversation. This changes only the user-facing CLF process steps, not the underlying protection or recovery behavior.</p>
    </div>
    <div class="grid gap-4 md:grid-cols-2">
      <label class="block">
        <div>Logging level</div>
        <select class="w-full mt-1 bg-zinc-900 text-zinc-100 border border-zinc-700 rounded p-2" x-model="config.observability.log_level">
          <option value="info">INFO</option>
          <option value="debug">DEBUG</option>
        </select>
      </label>
      <label class="flex items-center gap-2 rounded border border-zinc-800 bg-zinc-950/40 px-3 py-3">
        <input type="checkbox" x-model="config.observability.log_decisions" />
        <span>Show CLF runtime steps</span>
      </label>
      <label class="flex items-center gap-2 rounded border border-zinc-800 bg-zinc-950/40 px-3 py-3">
        <input type="checkbox" x-model="config.observability.log_rejections" />
        <span>Show warn/block runtime steps</span>
      </label>
      <label class="flex items-center gap-2 rounded border border-zinc-800 bg-zinc-950/40 px-3 py-3">
        <input type="checkbox" x-model="config.observability.expose_debug_api" />
        <span>Expose debug API</span>
      </label>
    </div>
    <p class="rounded border border-zinc-800 bg-zinc-950/40 px-3 py-2 text-zinc-300" x-text="observabilityHelp()"></p>
  </div>

  <div class="rounded border border-zinc-700 p-5 space-y-4">
    <div class="space-y-1">
      <div class="font-semibold">Advanced Surface Overrides</div>
      <p class="text-zinc-300">Manual surface changes are rendered in fixed CLF order and immediately switch the profile to <span class="font-medium text-zinc-200">custom</span> so the override stays explicit.</p>
    </div>
    <div class="space-y-3">
      <template x-for="surface in surfaceOrder" :key="surface">
        <label class="flex items-start justify-between gap-4 rounded border border-zinc-800 bg-zinc-900/40 px-3 py-3">
          <span class="space-y-1">
            <span class="block font-medium text-zinc-100" x-text="surfaceLabel(surface)"></span>
            <span class="block text-xs text-zinc-400" x-text="surfaceDetail(surface)"></span>
          </span>
          <input type="checkbox" x-model="config.surfaces[surface]" @change="markSurfaceOverride(surface)" />
        </label>
      </template>
    </div>
    <p class="text-zinc-400">Changing required surfaces can degrade the effective profile to custom. The status API reports that honestly instead of pretending everything is conformant.</p>
  </div>
    </div>
  </template>
</div>
