<div
  x-data="{
    status: null,
    loading: true,
    error: '',
    init() {
      this.refresh();
    },
    resolveContextId() {
      const query = new URLSearchParams(window.location.search || '');
      return this.$el.dataset.contextId || query.get('context_id') || null;
    },
    async refresh() {
      this.loading = true;
      this.error = '';
      try {
        const payload = this.resolveContextId() ? { context_id: this.resolveContextId() } : {};
        const res = await fetch('/api/plugins/cognition_layers/get_status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error(`Status request failed (${res.status})`);
        const data = await res.json();
        this.status = data && typeof data === 'object' ? data : {};
      } catch (error) {
        this.error = error && error.message ? error.message : 'Failed to load cognition layer status.';
      } finally {
        this.loading = false;
      }
    },
    profile() {
      return this.status && typeof this.status.profile === 'object' ? this.status.profile : {};
    },
    activeSurfaces() {
      const surfaces = this.profile().active_surfaces || {};
      return Object.entries(surfaces);
    },
    activeSurfaceNames() {
      return this.activeSurfaces().filter(([, enabled]) => !!enabled).map(([name]) => name);
    },
    fullFeatures() {
      const labels = {
        pattern_detector: 'Pattern detection',
        pattern_persistence_core: 'Pattern memory',
        context_manager: 'Context recovery',
        self_correction_trigger: 'Self-correction',
      };
      return this.activeSurfaceNames().filter(name => labels[name]).map(name => labels[name]);
    },
    recentDecisions() {
      return ((this.status && this.status.recent_decisions) || []).slice(-6).reverse();
    },
    recentCorrections() {
      return ((this.status && this.status.recent_corrections) || []).slice(-6).reverse();
    },
    patternSummary() {
      return ((this.status && this.status.pattern_summary) || []).slice(0, 6);
    },
    suiteEntries() {
      const suites = this.status && typeof this.status.required_suite_status === 'object' ? this.status.required_suite_status : {};
      return Object.entries(suites);
    },
    claimPaths() {
      const paths = this.status && typeof this.status.available_claim_paths === 'object' ? this.status.available_claim_paths : {};
      return Object.keys(paths).sort();
    },
    warnings() {
      return Array.isArray(this.profile().warnings) ? this.profile().warnings : [];
    },
    checkpointSummary() {
      return this.status && typeof this.status.checkpoint_summary === 'object' ? this.status.checkpoint_summary : {};
    },
    selfCorrectionSummary() {
      return this.status && typeof this.status.self_correction_summary === 'object' ? this.status.self_correction_summary : {};
    },
    boundedRecoverySummary() {
      return this.status && typeof this.status.bounded_recovery_summary === 'object' ? this.status.bounded_recovery_summary : {};
    },
    formatTime(value) {
      if (!value) return 'n/a';
      try {
        return new Date(value).toLocaleString();
      } catch (_) {
        return value;
      }
    },
    label(value, fallback = 'n/a') {
      if (value == null || value === '') return fallback;
      return String(value);
    },
    asJson(value) {
      if (!value || typeof value !== 'object') return '{}';
      return JSON.stringify(value, null, 2);
    },
  }"
  x-init="init()"
  class="space-y-4 text-sm"
  data-cognition-layers-status
>
  <div class="rounded border border-zinc-700 p-4 space-y-3">
    <div class="flex items-center justify-between gap-3">
      <div>
        <div class="font-semibold text-base">Cognition Layers Status</div>
        <p class="text-zinc-300">Inspect the active CLF profile, recent verification/recovery activity, and the plugin-local runtime state.</p>
      </div>
      <button
        class="rounded border border-zinc-600 px-3 py-1.5 text-xs text-zinc-200 hover:bg-zinc-800"
        type="button"
        @click="refresh()"
      >
        Refresh
      </button>
    </div>

    <template x-if="loading">
      <div class="rounded border border-zinc-800 bg-zinc-950/60 px-3 py-2 text-zinc-400">Loading status...</div>
    </template>

    <template x-if="error">
      <div class="rounded border border-red-800 bg-red-950/40 px-3 py-2 text-red-200" x-text="error"></div>
    </template>

    <template x-if="!loading && !error && status">
      <div class="space-y-4">
        <div class="rounded border border-zinc-700 bg-zinc-950/60 p-4 space-y-2">
          <div class="flex flex-wrap items-center gap-2">
            <span class="rounded bg-zinc-800 px-2 py-1 text-xs uppercase tracking-wide text-zinc-200" x-text="`Selected: ${label(status.selected_profile, 'full')}`"></span>
            <span class="rounded bg-zinc-800 px-2 py-1 text-xs uppercase tracking-wide text-zinc-200" x-text="`Effective: ${label(profile().effective_profile, 'full')}`"></span>
            <span
              class="rounded px-2 py-1 text-xs uppercase tracking-wide"
              :class="(status.claim_readiness && status.claim_readiness.ready) ? 'bg-emerald-950 text-emerald-200 border border-emerald-800' : 'bg-amber-950 text-amber-200 border border-amber-800'"
              x-text="(status.claim_readiness && status.claim_readiness.ready) ? 'Claim Ready' : 'Claim Not Ready'"
            ></span>
          </div>
          <p class="text-zinc-300" x-text="label(profile().status, 'No profile status reported.')"></p>

          <template x-if="profile().effective_profile === 'full'">
            <div class="rounded border border-emerald-800 bg-emerald-950/30 px-3 py-2 text-emerald-100">
              <div class="font-medium">Full profile active</div>
              <div class="text-emerald-200/90" x-text="fullFeatures().length ? fullFeatures().join(' • ') : 'Pattern memory, context recovery, and self-correction are available.'"></div>
            </div>
          </template>

          <template x-if="warnings().length">
            <div class="space-y-2">
              <div class="font-medium text-zinc-200">Warnings</div>
              <template x-for="warning in warnings()" :key="warning">
                <div class="rounded border border-amber-800 bg-amber-950/30 px-3 py-2 text-amber-100" x-text="warning"></div>
              </template>
            </div>
          </template>
        </div>

        <div class="grid gap-4 lg:grid-cols-2">
          <div class="rounded border border-zinc-700 p-4 space-y-3">
            <div class="font-semibold">Surfaces</div>
            <div class="grid gap-2 sm:grid-cols-2">
              <template x-for="[name, enabled] in activeSurfaces()" :key="name">
                <div class="flex items-center justify-between gap-3 rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                  <span class="text-zinc-200" x-text="name"></span>
                  <span
                    class="rounded px-2 py-0.5 text-xs uppercase tracking-wide"
                    :class="enabled ? 'bg-emerald-950 text-emerald-200 border border-emerald-800' : 'bg-zinc-900 text-zinc-400 border border-zinc-700'"
                    x-text="enabled ? 'active' : 'off'"
                  ></span>
                </div>
              </template>
            </div>
          </div>

          <div class="rounded border border-zinc-700 p-4 space-y-3">
            <div class="font-semibold">Claim Readiness</div>
            <div class="grid gap-2 sm:grid-cols-2">
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Ready</div>
                <div class="font-medium text-zinc-100" x-text="status.claim_readiness && status.claim_readiness.ready ? 'Yes' : 'No'"></div>
              </div>
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Available paths</div>
                <div class="font-medium text-zinc-100" x-text="claimPaths().length ? claimPaths().join(', ') : 'none'"></div>
              </div>
            </div>
            <div class="space-y-2">
              <div class="text-zinc-400">Required suites</div>
              <template x-if="status.claim_readiness && status.claim_readiness.bounded_recovery_override">
                <div class="rounded border border-amber-800 bg-amber-950/30 px-3 py-2 text-amber-100">
                  Bounded recovery override is active, so claim readiness is suppressed for this run even though the Full surfaces are still available.
                </div>
              </template>
              <template x-if="suiteEntries().length">
                <div class="space-y-2">
                  <template x-for="[name, passed] in suiteEntries()" :key="name">
                    <div class="flex items-center justify-between gap-3 rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                      <span class="text-zinc-200" x-text="name"></span>
                      <span
                        class="rounded px-2 py-0.5 text-xs uppercase tracking-wide"
                        :class="passed ? 'bg-emerald-950 text-emerald-200 border border-emerald-800' : 'bg-zinc-900 text-zinc-400 border border-zinc-700'"
                        x-text="passed ? 'pass' : 'pending'"
                      ></span>
                    </div>
                  </template>
                </div>
              </template>
              <template x-if="!suiteEntries().length">
                <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2 text-zinc-400">No suite data reported.</div>
              </template>
            </div>
          </div>
        </div>

        <div class="grid gap-4 lg:grid-cols-2">
          <div class="rounded border border-zinc-700 p-4 space-y-3">
            <div class="font-semibold">Checkpoint and Context</div>
            <div class="grid gap-2 sm:grid-cols-2">
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Checkpoint count</div>
                <div class="font-medium text-zinc-100" x-text="label(checkpointSummary().checkpoint_count, '0')"></div>
              </div>
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Latest checkpoint</div>
                <div class="font-medium text-zinc-100 break-all" x-text="label(checkpointSummary().latest_checkpoint_id)"></div>
              </div>
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Latest context</div>
                <div class="font-medium text-zinc-100 break-all" x-text="label(checkpointSummary().latest_context_id)"></div>
              </div>
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Plugin-local only</div>
                <div class="font-medium text-zinc-100" x-text="checkpointSummary().plugin_local_only ? 'Yes' : 'No'"></div>
              </div>
            </div>
            <div class="space-y-2">
              <div class="text-zinc-400">Latest restore</div>
              <pre class="overflow-x-auto rounded border border-zinc-800 bg-zinc-950/50 p-3 text-xs text-zinc-200" x-text="asJson(checkpointSummary().latest_restore || {})"></pre>
            </div>
            <div class="space-y-2">
              <div class="text-zinc-400">Latest compaction</div>
              <pre class="overflow-x-auto rounded border border-zinc-800 bg-zinc-950/50 p-3 text-xs text-zinc-200" x-text="asJson(checkpointSummary().latest_compaction || {})"></pre>
            </div>
          </div>

          <div class="rounded border border-zinc-700 p-4 space-y-3">
            <div class="font-semibold">Bounded Recovery</div>
            <div class="grid gap-2 sm:grid-cols-2">
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Enabled</div>
                <div class="font-medium text-zinc-100" x-text="boundedRecoverySummary().enabled ? 'Yes' : 'No'"></div>
              </div>
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Max restore</div>
                <div class="font-medium text-zinc-100" x-text="label(boundedRecoverySummary().max_restore_resolution)"></div>
              </div>
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Auto-continue</div>
                <div class="font-medium text-zinc-100" x-text="boundedRecoverySummary().allow_auto_continue_after_failure ? 'Yes' : 'No'"></div>
              </div>
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Idle recovery prompt</div>
                <div class="font-medium text-zinc-100" x-text="boundedRecoverySummary().inject_idle_recovery_policy ? 'Yes' : 'No'"></div>
              </div>
            </div>
            <template x-if="boundedRecoverySummary().claim_override_active">
              <div class="rounded border border-amber-800 bg-amber-950/30 px-3 py-2 text-amber-100">
                Claim conformance is enabled in config, but bounded recovery turns this run into a behavior override rather than a certified Full run.
              </div>
            </template>
            <div class="text-zinc-400 text-xs">This override narrows recovery behavior without disabling Full-profile surfaces such as pattern memory or checkpointing.</div>
          </div>

          <div class="rounded border border-zinc-700 p-4 space-y-3">
            <div class="font-semibold">Self-Correction</div>
            <div class="grid gap-2 sm:grid-cols-2">
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Mode</div>
                <div class="font-medium text-zinc-100" x-text="label(selfCorrectionSummary().mode)"></div>
              </div>
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Pending guidance</div>
                <div class="font-medium text-zinc-100" x-text="label(selfCorrectionSummary().pending_guidance_count, '0')"></div>
              </div>
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Last state</div>
                <div class="font-medium text-zinc-100" x-text="label(selfCorrectionSummary().last_correction_state)"></div>
              </div>
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2">
                <div class="text-zinc-400">Plugin-local only</div>
                <div class="font-medium text-zinc-100" x-text="selfCorrectionSummary().plugin_local_only ? 'Yes' : 'No'"></div>
              </div>
            </div>
            <div class="space-y-2">
              <div class="text-zinc-400">Last decision</div>
              <pre class="overflow-x-auto rounded border border-zinc-800 bg-zinc-950/50 p-3 text-xs text-zinc-200" x-text="asJson(selfCorrectionSummary().last_decision || {})"></pre>
            </div>
            <div class="space-y-2">
              <div class="text-zinc-400">Attempt counters</div>
              <pre class="overflow-x-auto rounded border border-zinc-800 bg-zinc-950/50 p-3 text-xs text-zinc-200" x-text="asJson(selfCorrectionSummary().attempt_counter || {})"></pre>
            </div>
          </div>
        </div>

        <div class="grid gap-4 lg:grid-cols-2">
          <div class="rounded border border-zinc-700 p-4 space-y-3">
            <div class="font-semibold">Recent Verification Decisions</div>
            <template x-if="recentDecisions().length">
              <div class="space-y-2">
                <template x-for="decision in recentDecisions()" :key="decision.id || `${decision.tool_name || decision.tool}-${decision.updated_at || decision.created_at || decision.reason}`">
                  <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2 space-y-1">
                    <div class="flex items-center justify-between gap-3">
                      <div class="font-medium text-zinc-100" x-text="label(decision.tool_name || decision.tool, 'tool')"></div>
                      <span
                        class="rounded px-2 py-0.5 text-xs uppercase tracking-wide"
                        :class="decision.action === 'block' ? 'bg-red-950 text-red-200 border border-red-800' : decision.action === 'warn' ? 'bg-amber-950 text-amber-200 border border-amber-800' : 'bg-emerald-950 text-emerald-200 border border-emerald-800'"
                        x-text="label(decision.action, 'allow')"
                      ></span>
                    </div>
                    <div class="text-zinc-300" x-text="label(decision.reason)"></div>
                    <div class="text-xs text-zinc-500" x-text="formatTime(decision.updated_at || decision.created_at)"></div>
                  </div>
                </template>
              </div>
            </template>
            <template x-if="!recentDecisions().length">
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2 text-zinc-400">No verification decisions recorded yet.</div>
            </template>
          </div>

          <div class="rounded border border-zinc-700 p-4 space-y-3">
            <div class="font-semibold">Recent Corrections</div>
            <template x-if="recentCorrections().length">
              <div class="space-y-2">
                <template x-for="correction in recentCorrections()" :key="correction.id || `${correction.trigger}-${correction.state}-${correction.updated_at || correction.created_at}`">
                  <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2 space-y-1">
                    <div class="flex items-center justify-between gap-3">
                      <div class="font-medium text-zinc-100" x-text="label(correction.state || correction.trigger, 'correction')"></div>
                      <div class="text-xs text-zinc-500" x-text="formatTime(correction.updated_at || correction.created_at)"></div>
                    </div>
                    <div class="text-zinc-300" x-text="label(correction.guidance || correction.action || correction.trigger)"></div>
                    <div class="text-xs text-zinc-500" x-text="correction.attempt != null && correction.max_attempts != null ? `Attempt ${correction.attempt}/${correction.max_attempts}` : label(correction.trigger, '')"></div>
                  </div>
                </template>
              </div>
            </template>
            <template x-if="!recentCorrections().length">
              <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2 text-zinc-400">No self-correction events recorded yet.</div>
            </template>
          </div>
        </div>

        <div class="rounded border border-zinc-700 p-4 space-y-3">
          <div class="font-semibold">Patterns</div>
          <div class="text-zinc-400" x-text="`Stored patterns: ${label(status.pattern_count, '0')}`"></div>
          <template x-if="patternSummary().length">
            <div class="grid gap-2 lg:grid-cols-2">
              <template x-for="pattern in patternSummary()" :key="pattern.id || pattern.pattern">
                <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2 space-y-1">
                  <div class="flex items-center justify-between gap-3">
                    <div class="font-medium text-zinc-100" x-text="label(pattern.title || pattern.type, 'pattern')"></div>
                    <div class="text-xs text-zinc-500" x-text="label(pattern.status, 'candidate')"></div>
                  </div>
                  <div class="text-zinc-300" x-text="label(pattern.pattern)"></div>
                  <div class="text-xs text-zinc-500" x-text="`confidence ${label(pattern.confidence, '0')} • used ${label(pattern.usage_count, '0')} times`"></div>
                </div>
              </template>
            </div>
          </template>
          <template x-if="!patternSummary().length">
            <div class="rounded border border-zinc-800 bg-zinc-950/50 px-3 py-2 text-zinc-400">No persisted patterns recorded yet.</div>
          </template>
        </div>
      </div>
    </template>
  </div>
</div>
